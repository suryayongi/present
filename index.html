<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Untukmu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Library Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="home-page">
    <div class="content-center">
        <h1 class="glitch-text">Selamat Ulang Tahun!</h1>
        <p>Ada sesuatu yang spesial buat kamu.</p>
        
        <!-- Tombol ini akan menyalakan lagu dan pindah halaman -->
        <a href="galeri.html" class="btn-mulai" id="btn-mulai">Buka Kejutan</a>
    </div>

    <!-- Tag Audio tersembunyi -->
    <audio id="bg-music" loop>
        <source src="assets/audio/Ed Sheeran - Perfect (Official Music Video).mp3" type="audio/mpeg">
    </audio>

    <script>
        // Efek Confetti langsung meledak saat halaman dibuka
        window.onload = function() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffb6c1', '#ff69b4', '#ffc0cb']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffb6c1', '#ff69b4', '#ffc0cb']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };

        // Menyimpan status musik agar terus menyala di halaman lain
        document.getElementById('btn-mulai').addEventListener('click', function(e) {
            // Karena pindah halaman akan mereset audio, trik paling aman di web statis 
            // adalah membuka halaman baru di tab baru (target="_blank") ATAU
            // menggunakan localStorage untuk menyimpan waktu putar, 
            // tapi yang paling mudah untuk level ini:
            sessionStorage.setItem("musicPlaying", "true");
        });
    </script>
</body>
</html>
