<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu, Kesempurnaanku</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="landing-page">
    <div class="landing-content">
        <h3 class="subtitle">Sebuah Perjalanan</h3>
        <h1 class="title">Selamat Ulang Tahun, Cintaku.</h1>
        <p class="message">Sebelum melanjutkan, pastikan volumenya menyala. Ada sesuatu yang ingin aku tunjukkan padamu.</p>
        
        <a href="galeri.html" class="btn-enter">Mulai Kenangan</a>
    </div>

    <script>
        // Efek Confetti yang elegan (warna emas dan putih)
        window.onload = function() {
            var duration = 4000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#D4AF37', '#FFFFFF', '#F9E5C9']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#D4AF37', '#FFFFFF', '#F9E5C9']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };
    </script>
</body>
</html>
